    <script>
        (function () {
            'use strict';
            if (window.DERS_PROGRAMI_APP_LOADED) return;
            window.DERS_PROGRAMI_APP_LOADED = true;

            window.toggleQuranView = (show, fromHistory = false) => {
                const scheduleApp = document.getElementById('app-schedule');
                const quranApp = document.getElementById('quran-root');
                if (show) {
                    scheduleApp.classList.add('hidden');
                    quranApp.classList.remove('hidden');
                    const isDark = document.documentElement.classList.contains('dark');
                    if (window.syncReactTheme) window.syncReactTheme(isDark);
                    if (!fromHistory && !window.location.hash.startsWith('#quran')) history.pushState({ quran: true, view: 'reader' }, '', '#quran');
                    if (fromHistory && window.location.hash.startsWith('#quran/')) {
                        const parts = window.location.hash.replace('#quran/', '').split('/');
                        const surahNum = parseInt(parts[0]);
                        const ayahNum = parts[1] ? parseInt(parts[1]) : null;
                        if (surahNum >= 1 && surahNum <= 114) {
                            window.__pendingQuranSurah = surahNum;
                            if (ayahNum) window.__pendingQuranAyah = ayahNum;
                        }
                    }
                } else {
                    quranApp.classList.add('hidden');
                    scheduleApp.classList.remove('hidden');
                    if (!fromHistory && window.location.hash.startsWith('#quran')) history.replaceState(null, '', window.location.pathname);
                }
            };

            window.addEventListener('popstate', (event) => {
                const state = event.state;
                if (state && state.quran) {
                    window.toggleQuranView(true, true);
                    if (window.dispatchQuranNavigation) window.dispatchQuranNavigation(state);
                } else {
                    window.toggleQuranView(false, true);
                }
            });

            document.getElementById('btn-open-quran').addEventListener('click', (e) => {
                e.preventDefault();
                window.toggleQuranView(true);
            });

            const parseQuranHash = () => {
                const hash = window.location.hash;
                if (!hash.startsWith('#quran')) return null;
                const path = hash.replace('#quran/', '');
                if (path === 'notes') return { view: 'my_notes' };
                if (path === 'playlists') return { view: 'playlists_list' };
                const parts = path.split('/');
                const surahNum = parseInt(parts[0]);
                const ayahNum = parts[1] ? parseInt(parts[1]) : null;
                if (surahNum >= 1 && surahNum <= 114) return { view: 'reader', surahNumber: surahNum, ayahNumber: ayahNum };
                return { view: 'reader' };
            };

            const initialRoute = parseQuranHash();
            if (initialRoute) {
                setTimeout(() => {
                    window.toggleQuranView(true, true);
                    setTimeout(() => {
                        if (window.dispatchQuranNavigation) window.dispatchQuranNavigation({ quran: true, ...initialRoute });
                        else window.__pendingQuranRoute = initialRoute;
                    }, 200);
                }, 100);
            }

            let _popstateJustFired = false;
            window.addEventListener('popstate', (e) => { 
                _popstateJustFired = true; setTimeout(() => { _popstateJustFired = false; }, 50);
                const route = parseQuranHash();
                if (route && window.dispatchQuranNavigation) window.dispatchQuranNavigation({ quran: true, ...route });
                else if (!route) window.toggleQuranView(false, true);
            }, { capture: true });

            window.addEventListener('hashchange', () => {
                if (_popstateJustFired) return;
                if (window.location.hash.startsWith('#quran')) {
                    window.toggleQuranView(true, true);
                    const route = parseQuranHash();
                    if (route && window.dispatchQuranNavigation) window.dispatchQuranNavigation({ quran: true, ...route });
                } else {
                    window.toggleQuranView(false, true);
                }
            });

            const CONFIG = Object.freeze({
                CACHE_KEY: 'ders_programi_v9_xlsx',
                CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQR-t6FwWuwU-JOYcDVEbLdkXT7R8cuvcuz9IPuOY78MPWM44MesHJKBHyI8ZVOehuh5yvv99yI2jLd/pub?output=xlsx',
                CLASSES: { hidden: 'hidden', rotate: 'rotate-icon', menuIn: ['scale-100', 'opacity-100'], menuOut: ['scale-95', 'opacity-0'], btnPrimary: ['bg-emerald-50', 'dark:bg-emerald-900/40', 'text-emerald-700', 'dark:text-emerald-400', 'hover:bg-emerald-100', 'dark:hover:bg-emerald-900/60'], btnSecondary: ['bg-amber-50', 'dark:bg-amber-900/30', 'text-amber-700', 'dark:text-amber-400', 'hover:bg-amber-100', 'dark:hover:bg-amber-900/50'] },
                MONTHS: { 'ocak': 0, 'subat': 1, 'mart': 2, 'nisan': 3, 'mayis': 4, 'haziran': 5, 'temmuz': 6, 'agustos': 7, 'eylul': 8, 'ekim': 9, 'kasim': 10, 'aralik': 11 },
                SEARCH_DEBOUNCE_MS: 150, JOIN_TOLERANCE_MIN: 90
            });

            const EXTRA_RESOURCES = [
                { name: "Harf telaffuzu", url: "https://drive.google.com/file/d/1DLRV_JpC575qT6psdeiL9eI8VHE8usWw/view?usp=drive_link" },
                { name: "Kur'an Dersi 1", url: "https://drive.google.com/file/d/1-B8LH40llBzn27A3sBQQSBP-dI7P_sWO/view?usp=drive_link" },
                { name: "Kur'an Dersi 2", url: "https://drive.google.com/file/d/1djd_lLS8PyqmP-_5hjfkGR2jDm7dbRCp/view?usp=drive_link" },
                { name: "Kur'an Dersi 3", url: "https://drive.google.com/file/d/10YQXMUTkcMyWww5qFm6uKjtoreGaPGwI/view?usp=drive_link" },
                { name: "Kur'an Dersi 4", url: "https://drive.google.com/file/d/1shMgMEn30NPCrEHbgq0UWqZz21KDsmWI/view?usp=drive_link" },
                { name: "Kur'an Dersi 5", url: "https://drive.google.com/file/d/1DToY7jOE2OnyLQKhCs0s2WYLrN6AkTE8/view?usp=drive_link" },
                { name: "Kur'an Dersi 6", url: "https://drive.google.com/file/d/1RgscC_0-riGl4Ocjt46xKljns1MVeAVI/view?usp=drive_link" },
                { name: "Kur'an Dersi 7", url: "https://drive.google.com/file/d/1tT7208haWxluGZClorbA_KEL9q7CJKWC/view?usp=drive_link" },
                { name: "Kur'an Dersi 17", url: "https://drive.google.com/file/d/1IF52k3Yj-2mCdvomJ_Yml7Pe6d8au5Ps/view?usp=drive_link" },
                { name: "Kur'an dersi notlar 1", url: "https://drive.google.com/file/d/1qiy60bnYz22o18KpV7UPotZhPqvNbZ2H/view?usp=drive_link" },
                { name: "Kur'an dersi notlar 2", url: "https://drive.google.com/file/d/19BR6RSEGndxEAoyqiIKeEBRtmv5StuG3/view?usp=drive_link" },
                { name: "Kur'an dersi notlar 3", url: "https://drive.google.com/file/d/1FAwK7eYkDEwJmdDL7aBHCvKxH-cLAMQw/view?usp=drive_link" },
                { name: "Kur'an dersi notlar 4", url: "https://drive.google.com/file/d/1RSqFv2Wy16pmM4p4kxPFw3FYuLvNaJTg/view?usp=drive_link" },
                { name: "Kur'an dersi notlar 5", url: "https://drive.google.com/file/d/18Z8L6uLyV5do0GZaiODcdVSbuBVRiFYw/view?usp=drive_link" }
            ];

            const Utils = {
                normalizeText(val) {
                    if (!val) return '';
                    const trMap = { 'İ': 'i', 'I': 'ı', 'ı': 'i', 'ş': 's', 'Ş': 's', 'ğ': 'g', 'Ğ': 'g', 'ü': 'u', 'Ü': 'u', 'ö': 'o', 'Ö': 'o', 'ç': 'c', 'Ç': 'c', 'â': 'a', 'Â': 'a', 'î': 'i', 'Î': 'i', 'û': 'u', 'Û': 'u' };
                    return String(val).replace(/[İIışŞğĞüÜöÖçÇâÂîÎûÛ]/g, c => trMap[c] || c).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                },
                parseTimestamp(dateStr, timeStr) {
                    try {
                        const normDate = this.normalizeText(dateStr);
                        const normTime = timeStr ? timeStr.trim() : "00:00";
                        const dayMatch = normDate.match(/(\d+)/);
                        if (!dayMatch) return 0;
                        const day = parseInt(dayMatch[1], 10);
                        let monthIndex = -1;
                        for (const [key, val] of Object.entries(CONFIG.MONTHS)) {
                            if (normDate.includes(key) || normDate.includes(key.substring(0, 3))) { monthIndex = val; break; }
                        }
                        if (monthIndex === -1) return 0;
                        const [hour, minute] = normTime.split(':').map(n => parseInt(n, 10) || 0);
                        const now = new Date();
                        let year = now.getFullYear();
                        const currentMonth = now.getMonth();
                        if (currentMonth > 8 && monthIndex < 3) year += 1;
                        else if (currentMonth < 3 && monthIndex > 8) year -= 1;
                        const candidate = Date.UTC(year, monthIndex, day, hour - 3, minute);
                        if (candidate - now.getTime() > 60 * 24 * 60 * 60 * 1000) year -= 1;
                        return Date.UTC(year, monthIndex, day, hour - 3, minute);
                    } catch (e) { return 0; }
                }
            };

            class DataManager {
                constructor() { this.groupedData = {}; }
                get resources() { return EXTRA_RESOURCES; }
                loadFromCache() {
                    try {
                        const raw = localStorage.getItem(CONFIG.CACHE_KEY);
                        if (!raw) return null;
                        const parsed = JSON.parse(raw);
                        Object.values(parsed).flat().forEach(item => { if (!item.searchIndex) item.searchIndex = Utils.normalizeText(`${item.subject} ${item.speaker} ${item.date} ${item.day}`); });
                        this.groupedData = parsed;
                        return this.groupedData;
                    } catch (e) { localStorage.removeItem(CONFIG.CACHE_KEY); return null; }
                }
                saveToCache(data) { this.groupedData = data; try { localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify(data)); } catch (e) { } }
                async fetchFreshData() {
                    try {
                        const cacheBuster = `&_t=${Date.now()}&_r=${Math.floor(Math.random() * 1e7)}`;
                        const response = await fetch(CONFIG.CSV_URL + cacheBuster, { cache: 'no-store' });
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const buffer = await response.arrayBuffer();
                        const workbook = XLSX.read(buffer, { type: 'array' });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, raw: false });
                        return this.#processRows(rows);

                    const input = document.getElementById('input-search'); if (!input) return;
                    const newInfo = input.cloneNode(true); input.parentNode.replaceChild(newInfo, input);

                    window.addEventListener('touchmove', dismissKeyboard, { passive: true }); window.addEventListener('scroll', dismissKeyboard, { passive: true });

                        clearTimeout(this.#searchTimer); const query = e.target.value.trim();
                        this.#searchTimer = setTimeout(() => { if (query) { const results = this.#dataManager.search(query); this.#renderer.renderFiltered(results); } else { this.#renderer.renderSchedule(this.#dataManager.groupedData); } }, CONFIG.SEARCH_DEBOUNCE_MS);
                    });
                }
                #setupDropdown() {
                    const btn = document.getElementById('btn-quran-menu'); const menu = document.getElementById('menu-quran');
                    if (!btn || !menu) return;
                    const newBtn = btn.cloneNode(true); btn.parentNode.replaceChild(newBtn, btn);
                    const icon = newBtn.querySelector('.fa-chevron-down'); let isOpen = false;
                    const toggle = (forceState) => {
                        isOpen = forceState !== undefined ? forceState : !isOpen;
                        if (isOpen) {
                            menu.classList.remove(CONFIG.CLASSES.hidden);
                            requestAnimationFrame(() => { menu.classList.remove(...CONFIG.CLASSES.menuOut); menu.classList.add(...CONFIG.CLASSES.menuIn); icon.classList.add(CONFIG.CLASSES.rotate); });
                            newBtn.setAttribute('aria-expanded', 'true');

                            menu.classList.remove(...CONFIG.CLASSES.menuIn); menu.classList.add(...CONFIG.CLASSES.menuOut); icon.classList.remove(CONFIG.CLASSES.rotate); newBtn.setAttribute('aria-expanded', 'false');
                            setTimeout(() => { if (!isOpen) menu.classList.add(CONFIG.CLASSES.hidden); }, 200);
                        }
                    };
                    newBtn.addEventListener('click', (e) => { e.stopPropagation(); toggle(); });
                    document.addEventListener('click', (e) => { if (isOpen && !newBtn.contains(e.target) && !menu.contains(e.target)) toggle(false); });
                }
            }
            document.addEventListener('DOMContentLoaded', () => {
                new App().init();
                if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(err => console.warn('[SW] Registration failed:', err));
            });

        const MyNotesView = () => {

                <div className="flex flex-col h-full font-sans relative">
                    <header className="bg-emerald-700 dark:bg-emerald-900 text-white px-4 pb-2 shadow-lg z-20 sticky top-0 border-b border-transparent dark:border-emerald-800">
                        <div className="max-w-md mx-auto relative pt-2">
                            <div className="absolute right-0 top-1.5 flex items-center gap-1">
                                <button onClick={() => setDarkMode(!darkMode)} className="bg-emerald-600 p-1.5 rounded-full w-8 h-8 flex justify-center items-center"><i className={`fa-solid ${darkMode?'fa-sun':'fa-moon'} text-xs`}></i></button>
                                <div className="flex items-center bg-emerald-800 rounded-lg px-1.5 py-1 gap-1">
                                    <button onClick={() => setFontSize(p => Math.max(14, p - 2))} className="w-6 h-6 bg-emerald-600 rounded text-xs font-bold">-</button>
                                    <span className="text-xs font-mono w-4 text-center">{fontSize}</span>
                                    <button onClick={() => setFontSize(p => Math.min(32, p + 2))} className="w-6 h-6 bg-emerald-600 rounded text-xs font-bold">+</button>
                                </div>
                            </div>
                            <div className="mb-2 flex items-center gap-3 pr-28">
                                <button onClick={goBack} className="bg-emerald-800 rounded-lg h-8 w-8 flex justify-center items-center shrink-0"><i className="fa-solid fa-arrow-left text-sm"></i></button>
                                <div><h1 className="text-lg font-bold leading-none truncate"><i className="fa-solid fa-book-open mr-2 text-sm"></i>Kuran Rehberi</h1></div>
                            </div>
                            <div className="flex gap-2 items-center mb-2">
                                <form onSubmit={e => { e.preventDefault(); if (searchInput.length >= 3) handleSearch(searchInput); }} className="relative flex-1">
                                    <input type="text" placeholder="Ara (Örn: namaz)..." value={searchInput} onChange={e => setSearchInput(e.target.value)} className="w-full p-2 pl-9 rounded-lg text-sm text-gray-800 dark:text-white dark:bg-black border-0 shadow-sm" />
                                    <div className="absolute left-0 top-0 h-full w-10 flex items-center justify-center text-gray-400">{searching ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-search"></i>}</div>
                                </form>
                            </div>
                            <div className="flex gap-1 mt-2 mb-1">
                                <button onClick={() => navigate('reader')} className={`flex-1 py-1.5 rounded-lg text-xs font-medium ${viewMode==='reader'?'bg-white text-emerald-800':'text-emerald-100 bg-emerald-800'}`}><i className="fa-solid fa-book-open"></i> Kur'an</button>
                                <button onClick={() => navigate('my_notes')} className={`flex-1 py-1.5 rounded-lg text-xs font-medium ${viewMode==='my_notes'?'bg-white text-emerald-800':'text-emerald-100 bg-emerald-800'}`}><i className="fa-solid fa-comment"></i> Notlarım</button>
                                <button onClick={() => navigate('playlists_list')} className={`flex-1 py-1.5 rounded-lg text-xs font-medium ${viewMode.includes('playlist')?'bg-white text-emerald-800':'text-emerald-100 bg-emerald-800'}`}><i className="fa-solid fa-layer-group"></i> Listelerim</button>
                            </div>
                        </div>
                    </header>
                    <div className="flex flex-1 overflow-hidden relative">
                        <SurahList />
                        <MainContent />
                        <PlayerBar />
                    </div>
                    {selectedAyahs.length > 0 && (
                        <div className="fixed bottom-20 left-1/2 transform -translate-x-1/2 z-50 bg-emerald-800 text-white px-6 py-3 rounded-full shadow-xl flex items-center gap-4">
                            <span className="font-bold text-sm whitespace-nowrap">{selectedAyahs.length} Seçildi</span>
                            <button onClick={() => setPlaylistModal(true)} className="font-bold text-sm hover:text-emerald-200 flex items-center gap-2"><i className="fa-solid fa-folder-plus"></i> Listeye Ekle</button>
                            <button onClick={() => setSelectedAyahs([])} className="w-6 h-6 rounded-full bg-black/20"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                    )}
                    {playlistModal && (
                        <div className="fixed inset-0 z-[100] bg-black/50 flex justify-center items-center p-4">
                            <div className="bg-white dark:bg-black p-6 rounded-xl w-full max-w-sm">
                                <h3 className="font-bold mb-4 dark:text-white">Listeye Ekle</h3>
                                <input type="text" placeholder="Yeni Liste Adı" value={newListName} onChange={e=>setNewListName(e.target.value)} className="w-full p-2 border rounded mb-4 dark:bg-gray-800 dark:border-neutral-700 dark:text-white" />
                                <div className="flex justify-end gap-2">
                                    <button onClick={() => setPlaylistModal(false)} className="px-4 py-2 text-gray-500">İptal</button>
                                    <button onClick={() => { if(newListName) { setPlaylists(p => [...p, {id:Date.now(), name:newListName, items:selectedAyahs}]); setSelectedAyahs([]); setPlaylistModal(false); showToast("Eklendi"); } }} className="px-4 py-2 bg-emerald-600 text-white rounded">Oluştur</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {toastMessage && <div className="fixed top-20 left-1/2 transform -translate-x-1/2 z-[150] bg-gray-900/90 text-white px-4 py-2 rounded-full shadow-lg text-sm flex gap-2"><i className="fa-solid fa-check text-emerald-400"></i>{toastMessage}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('quran-root'));
        root.render(<QuranProvider><AppContainer /></QuranProvider>);
    </script>
</body>
</html>
