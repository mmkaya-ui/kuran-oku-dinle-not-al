<!DOCTYPE html>
<html lang="tr" class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Kuran okuma, dinleme, arama ve tefekkür uygulaması. Türkçe meal, tefsir ve sesli tilavet.">
    <meta name="theme-color" content="#047857">
    <meta name="color-scheme" content="light dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Kuran Talebesi">
    <meta name="format-detection" content="telephone=no">
    <title>Kuran Talebesi</title>

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="Kuran Talebesi">
    <!-- Preload Critical Fonts for CLS / FCP Optimization -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/webfonts/fa-solid-900.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v20/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuLyfMZg.ttf" as="font" type="font/ttf" crossorigin>
    
    <!-- API Preconnects -->
    <link rel="preconnect" href="https://api.alquran.cloud" crossorigin>
    <link rel="dns-prefetch" href="https://api.alquran.cloud">

    <!-- Asynchronous Icons to prevent Render-Blocking -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>

    <!-- Inline Google Fonts (font-display: optional) for Zero-FCP Delay -->
    <style>
        @font-face {
            font-family: 'Amiri'; font-style: italic; font-weight: 400; font-display: optional;
            src: url(https://fonts.gstatic.com/s/amiri/v30/J7afnpd8CGxBHpUrtLY.ttf) format('truetype');
        }
        @font-face {
            font-family: 'Amiri'; font-style: normal; font-weight: 400; font-display: optional;
            src: url(https://fonts.gstatic.com/s/amiri/v30/J7aRnpd8CGxBHqUp.ttf) format('truetype');
        }
        @font-face {
            font-family: 'Amiri'; font-style: normal; font-weight: 700; font-display: optional;
            src: url(https://fonts.gstatic.com/s/amiri/v30/J7acnpd8CGxBHp2VkZY4.ttf) format('truetype');
        }
        @font-face {
            font-family: 'Inter'; font-style: normal; font-weight: 300; font-display: optional;
            src: url(https://fonts.gstatic.com/s/inter/v20/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuOKfMZg.ttf) format('truetype');
        }
        @font-face {
            font-family: 'Inter'; font-style: normal; font-weight: 400; font-display: optional;
            src: url(https://fonts.gstatic.com/s/inter/v20/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuLyfMZg.ttf) format('truetype');
        }
        @font-face {
            font-family: 'Inter'; font-style: normal; font-weight: 500; font-display: optional;
            src: url(https://fonts.gstatic.com/s/inter/v20/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuI6fMZg.ttf) format('truetype');
        }
        @font-face {
            font-family: 'Inter'; font-style: normal; font-weight: 600; font-display: optional;
            src: url(https://fonts.gstatic.com/s/inter/v20/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuGKYMZg.ttf) format('truetype');
        }
        @font-face {
            font-family: 'Inter'; font-style: normal; font-weight: 700; font-display: optional;
            src: url(https://fonts.gstatic.com/s/inter/v20/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuFuYMZg.ttf) format('truetype');
        }
        
        /* Loading Animation */
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>

    <!-- Apply theme before first paint to prevent FOUC -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme');
                var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (t === 'dark' || (!t && sys)) document.documentElement.classList.add('dark');
            } catch (e) { /* ignore */ }
        })();
    </script>
    
    <!-- Critical API Preloads for 11s LCP Fix -->
    <link rel="preload" href="https://api.alquran.cloud/v1/surah" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="https://api.alquran.cloud/v1/surah/1/editions/quran-simple,tr.transliteration,tr.vakfi,tr.yazir,tr.ates,tr.ozturk,tr.yildirim,tr.yuksel,ar.alafasy" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="https://api.alquran.cloud/v1/surah/1" as="fetch" crossorigin="anonymous">

</head>

<body class="transition-colors duration-300 flex flex-col">

    <!-- ========================================== -->
    <!-- QURAN APP CONTAINER (React Mount)          -->
    <!-- ========================================== -->
    <div id="quran-root"
        class="fixed inset-0 z-[200] bg-gray-50 dark:bg-black w-full h-full overflow-hidden flex flex-col transition-colors duration-300">
        <!-- Initial FCP Loader -->
        <div style="display:flex; height:100%; width:100%; align-items:center; justify-content:center; color:#10b981;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;">
                <circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle>
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path>
            </svg>
        </div>
    </div>

    <!-- Vite-bundled entry: schedule + quran + service worker -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
